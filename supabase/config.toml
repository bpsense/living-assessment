# Supabase CLI config — used only for local dev / CI (the RLS test gate).
# Production is managed via migrations applied through the Supabase MCP, not this file.
# If `supabase start` rejects a key, reconcile with `supabase init` for your CLI version.
project_id = "living-assessment"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false

[realtime]
enabled = false

[studio]
enabled = false

[inbucket]
enabled = false

[storage]
enabled = false

[analytics]
enabled = false

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
jwt_expiry = 3600
enable_signup = true
